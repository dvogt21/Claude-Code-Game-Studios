  - name: Mage
    move_speed_base: 125
    move_speed_max: 140
    move_speed_unit: u/s
    hp_base_lv1: 80            # STR 4, approx from Formula 5
    source: design/gdd/character-stats.md
    referenced_by: []


# ─────────────────────────────────────────────────────────────
actions:
  # Named input actions from input-and-controls.md consumed by movement.md and combat.md

  - name: move_left
    bufferable: false
    description: Leftward directional axis; one component of Input.get_vector()
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md

  - name: move_right
    bufferable: false
    description: Rightward directional axis
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md

  - name: move_up
    bufferable: false
    description: Upward directional axis; triggers ladder grab in movement.md
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md

  - name: move_down
    bufferable: false
    description: Downward directional axis; triggers drop-through in movement.md
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md

  - name: attack
    bufferable: true
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/combat.md    # pending

  - name: dodge
    bufferable: true
    stamina_cost: 20
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md
      - design/gdd/stamina.md   # pending
      - design/gdd/combat.md    # pending

  - name: parry
    bufferable: true
    stamina_cost: 25
    window_seconds: 0.35        # = PARRY_WINDOW_BASE; gear-modifiable
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md
      - design/gdd/stamina.md   # pending
      - design/gdd/combat.md    # pending

  - name: jump
    bufferable: false
    description: Direct-polled via is_action_just_pressed(); no InputResolver buffer (intentional)
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/movement.md


# ─────────────────────────────────────────────────────────────
flags:
  # Runtime boolean flags exposed by one system and read by others

  - name: i_frames_active
    type: bool
    description: True during the I-frame window of a dodge roll; read by Combat to determine hit immunity
    source: design/gdd/movement.md
    referenced_by:
      - design/gdd/combat.md    # pending — must read this flag, not compute its own

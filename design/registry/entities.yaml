# Entity Registry — Ashen Maple
# Cross-system facts: values defined in one GDD and referenced by others.
# Do not change a value here without updating the source GDD first.

constants:
  - name: INPUT_BUFFER_FRAMES
    type: constant
    value: 3
    unit: frames
    description: Number of frames a bufferable input press remains valid
    source: design/gdd/input-and-controls.md
    referenced_by:
      - design/gdd/combat.md  # pending

  - name: INPUT_DEADZONE_MOVE
    type: constant
    value: 0.20
    unit: ratio
    description: Minimum analog stick magnitude to register movement
    source: design/gdd/input-and-controls.md
    referenced_by: []

  - name: INPUT_DEADZONE_ACTION
    type: constant
    value: 0.50
    unit: ratio
    description: Analog stick threshold for triggering digital actions
    source: design/gdd/input-and-controls.md
    referenced_by: []

  - name: PARRY_WINDOW
    type: constant
    value: 0.35
    unit: seconds
    description: Base parry input window (gear-modifiable)
    source: design/gdd/character-stats.md
    referenced_by:
      - design/gdd/input-and-controls.md
      - design/gdd/combat.md  # pending

  - name: DODGE_STAMINA_COST
    type: constant
    value: 20
    unit: stamina
    description: Stamina cost of a dodge roll
    source: design/gdd/character-stats.md
    referenced_by:
      - design/gdd/stamina.md  # pending
      - design/gdd/combat.md  # pending

  - name: PARRY_STAMINA_COST
    type: constant
    value: 25
    unit: stamina
    description: Stamina cost of a shield parry
    source: design/gdd/character-stats.md
    referenced_by:
      - design/gdd/stamina.md  # pending
      - design/gdd/combat.md  # pending

  - name: STAMINA_REGEN_LOCKOUT_DELAY
    type: constant
    value: 1.0
    unit: seconds
    description: Delay before stamina regen begins after any stamina spend
    source: design/gdd/character-stats.md
    referenced_by:
      - design/gdd/stamina.md  # pending

constants:
  # --- Movement GDD constants (added 2026-06-01) ---
  - name: GRAVITY
    type: constant
    value: 980.0
    unit: u/s²
    description: Downward gravitational acceleration applied each physics frame when not on floor
    source: design/gdd/movement.md
    referenced_by:
      - design/gdd/level-design.md  # pending — vertical gap constraint

  - name: JUMP_VELOCITY
    type: constant
    value: 480.0
    unit: u/s
    description: Initial upward velocity applied at jump start; gives ~117.6 unit apex height
    source: design/gdd/movement.md
    referenced_by: []

  - name: COYOTE_FRAMES
    type: constant
    value: 4
    unit: frames
    description: Physics frames after leaving a floor edge during which jump is still valid
    source: design/gdd/movement.md
    referenced_by: []

  - name: DODGE_DURATION
    type: constant
    value: 0.45
    unit: seconds
    description: Total dodge roll animation duration; hard ceiling for i-frame window (Formula 4)
    source: design/gdd/movement.md
    referenced_by:
      - design/gdd/combat.md  # pending

  - name: DODGE_SPEED_MULTIPLIER
    type: constant
    value: 2.2
    unit: ratio
    description: Dodge velocity = move_speed × this multiplier; gives 2.1–2.8 char-height dodge distance
    source: design/gdd/movement.md
    referenced_by: []

  - name: CLIMB_SPEED
    type: constant
    value: 80.0
    unit: u/s
    description: Vertical speed while on a ladder or rope
    source: design/gdd/movement.md
    referenced_by: []

  - name: DROP_THROUGH_HOLD
    type: constant
    value: 0.10
    unit: seconds
    description: Duration move_down must be held to trigger drop-through on a one-way platform
    source: design/gdd/movement.md
    referenced_by: []

  - name: DROP_THROUGH_GRACE
    type: constant
    value: 0.20
    unit: seconds
    description: Duration one_way_platform collision is disabled after a drop-through trigger
    source: design/gdd/movement.md
    referenced_by: []

actions:
  # --- Movement GDD actions ---
  - name: i_frames_active
    type: flag
    description: Boolean; true during the I-frame window of a dodge roll. Read by Combat to determine hit immunity.
    source: design/gdd/movement.md
    referenced_by:
      - design/gdd/combat.md  # pending

  # --- Input & Controls GDD actions ---
  # was: single `move` action before 2026-05-31 design-review
  - name: move_left
    type: action
    bufferable: false
    description: Leftward directional axis; one of four components for Input.get_vector()

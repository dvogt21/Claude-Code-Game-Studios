    referenced_by:
      - design/gdd/movement.md   # Formula 2 dodge velocity examples

  - name: Thief
    move_speed_base: 145
    move_speed_max: 160
    move_speed_unit: u/s
    hp_base_lv1: 80            # STR 4, approx from Formula 5
    stamina_base_lv1: 56       # DEX 9, Formula 7 in character-stats.md
    source: design/gdd/character-stats.md
    referenced_by:
      - design/gdd/movement.md   # Formula 2/3 dodge velocity/distance examples

  - name: Archer
    move_speed_base: 135
    move_speed_max: 150
    move_speed_unit: u/s
    source: design/gdd/character-stats.md
